<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Charades</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <main class="app-container">
    <header class="app-header setup-only">
      <h1>Charades</h1>
      <nav class="tabs">
        <button class="tab-btn active" data-difficulty="easy">Easy</button>
        <button class="tab-btn" data-difficulty="medium">Medium</button>
        <button class="tab-btn" data-difficulty="hard">Hard</button>
      </nav>
      
      <div class="timer-settings">
        <label for="timeSlider">Timer: <span id="timeDisplay">60</span>s</label>
        <input type="range" id="timeSlider" min="15" max="120" step="15" value="60">

        <div class="lightning-toggle-container">
            <label for="lightningToggle">⚡ Lightning Round</label>
            <label class="switch">
              <input type="checkbox" id="lightningToggle">
              <span class="slider round"></span>
            </label>
          </div>
      </div>
    </header>

    <section class="card-stage">
      <div class="flashcard">
        <div class="card-content" id="cardContent">
          <p class="placeholder-text">Tap "Next Card"<br>to begin!</p>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
            <div id="scoreDisplay" class="score-display hidden">
        Score: <span id="scoreValue">0</span>
      </div>
    </section>

    <footer class="app-footer">
      <div class="action-buttons">
        <button id="startTimerBtn" class="secondary-btn" disabled>Start Timer</button>
        <button id="nextBtn" class="primary-btn">Next Card</button>
        <div id="lightningControls" class="lightning-controls hidden">
            <button id="skipBtn" class="action-btn skip-btn">Skip</button>
            <button id="correctBtn" class="action-btn correct-btn">Correct!</button>
            <button id="cancelBtn" class="action-btn cancel-btn">Cancel</button>
          </div>
      </div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
