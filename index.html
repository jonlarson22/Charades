<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Charades</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <main class="app-container">
    
    <section id="view-lobby" class="view active">
      <header class="app-header">
        <h1>Charades</h1>
        <p class="subtitle">Select your family mode:</p>
      </header>

      <div class="mode-select-grid">
        <div class="mode-card selected" data-mode="toddler">
          <div class="mode-info">
            <h3>🐱 Toddler Mode</h3>
            <p>Pictures only • No timer • Self-paced</p>
          </div>
        </div>

        <div class="mode-card" data-mode="classic">
          <div class="mode-info">
            <h3>⭐ Classic Charades</h3>
            <p>Text words • Timed rounds</p>
          </div>
        </div>

        <div class="mode-card" data-mode="challenge">
          <div class="mode-info">
            <h3>⚡ Lightning Round</h3>
            <p>Fast-paced • Scored • Skip/Correct rules</p>
          </div>
        </div>
      </div>

      <div id="lobbyTimerContainer" class="timer-settings hidden">
        <label for="timeSlider">Round Length: <span id="timeDisplay">60</span>s</label>
        <input type="range" id="timeSlider" min="15" max="120" step="15" value="60">
      </div>

      <footer class="app-footer">
        <button id="startGameBtn" class="primary-btn">Start Game</button>
      </footer>
    </section>


    <section id="view-stage" class="view">
      <header class="stage-header">
        <span id="stageModeTitle" class="badge">Mode</span>
        <div id="scoreDisplay" class="score-badge hidden">Score: <span id="scoreValue">0</span></div>
      </header>

      <div class="card-stage">
        <div class="flashcard">
          <div class="card-content" id="cardContent">
            </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <footer class="app-footer">
        <div id="controlsPreStart" class="control-group hidden">
          <button id="startTimerBtn" class="secondary-btn">Start Timer</button>
        </div>

        <div id="controlsManual" class="control-group hidden">
          <button id="nextCardBtn" class="primary-btn">Next Card</button>
        </div>

        <div id="controlsLightning" class="control-group lightning-controls hidden">
          <button id="skipBtn" class="action-btn skip-btn">Skip</button>
          <button id="correctBtn" class="action-btn correct-btn">Correct!</button>
        </div>

        <button id="exitStageBtn" class="cancel-btn">End Round Early</button>
      </footer>
    </section>


    <section id="view-recap" class="view">
      <div class="recap-stage">
        <div class="recap-box">
          <h2>⏰ Time's Up!</h2>
          <div id="recapScoreContainer" class="recap-score hidden">
            <p>Final Score</p>
            <span id="recapScoreValue">0</span>
          </div>
        </div>
      </div>

      <footer class="app-footer recap-footer">
        <button id="playAgainBtn" class="primary-btn">Play Again</button>
        <button id="changeModeBtn" class="secondary-btn">Change Mode</button>
      </footer>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
