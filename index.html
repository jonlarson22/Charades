<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Charades</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <main class="app-container">
    <header class="app-header">
      <h1>Charades</h1>
      <nav class="tabs">
        <button class="tab-btn active" data-difficulty="easy">Easy</button>
        <button class="tab-btn" data-difficulty="medium">Medium</button>
        <button class="tab-btn" data-difficulty="hard">Hard</button>
      </nav>
      
      <div class="timer-settings">
        <label for="timeSlider">Timer: <span id="timeDisplay">60</span>s</label>
        <input type="range" id="timeSlider" min="15" max="120" step="15" value="60">
      </div>
    </header>

    <section class="card-stage">
      <div class="flashcard">
        <div class="card-content" id="cardContent">
          <p class="placeholder-text">Tap "Next Card"<br>to begin!</p>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <footer class="app-footer">
      <button id="nextBtn" class="primary-btn">Next Card</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
